bundle:
  name: aerospace-streaming-pipeline

targets:
  dev:
    default: true
    workspace:
      host: https://dbc-f0e8f544-e42b.cloud.databricks.com
  prod:
    workspace:
      host: https://dbc-f0e8f544-e42b.cloud.databricks.com

resources:
  jobs:
    # ==========================================
    # WORKFLOW 1: Daily Dimension Sync (Batch)
    # ==========================================
    daily_dimension_sync:
      name: "Workflow 1: Daily Dimension Sync"
      email_notifications:
        on_failure:
          - "venkatramjinutukurthi@gmail.com"
      environments:
        - environment_key: serverless_env
          spec:
            client: "1"
      tasks:
        - task_key: Bronze_Batch
          environment_key: serverless_env
          spark_python_task:
            python_file: ./databricks_lakehouse_pipelines/01_bronze/02_dim_erp_data_brz.py
        - task_key: Silver_Batch
          depends_on:
            - task_key: Bronze_Batch
          environment_key: serverless_env
          spark_python_task:
            python_file: ./databricks_lakehouse_pipelines/02_silver/02_dim_erp_data_slv.py

    # ==========================================
    # WORKFLOW 2: 5-Minute Telemetry Engine (Stream)
    # ==========================================
    telemetry_streaming_engine:
      name: "Workflow 2: 5-Min Telemetry Engine"
      max_concurrent_runs: 1
      schedule:
        quartz_cron_expression: "0 */5 * * * ?" # Every 5 Minutes
        timezone_id: "Asia/Calcutta"
      email_notifications:
        on_failure:
          - "venkatramjinutukurthi@gmail.com"
      environments:
        - environment_key: serverless_env
          spec:
            client: "1"
      tasks:
        - task_key: Bronze_Stream
          environment_key: serverless_env
          spark_python_task:
            python_file: ./databricks_lakehouse_pipelines/01_bronze/01_fact_telemetry_brz.py
        - task_key: Silver_Stream
          depends_on:
            - task_key: Bronze_Stream
          environment_key: serverless_env
          spark_python_task:
            python_file: ./databricks_lakehouse_pipelines/02_silver/01_fact_telemetry_slv.py
        - task_key: Gold_Alerts
          depends_on:
            - task_key: Silver_Stream
          environment_key: serverless_env
          spark_python_task:
            python_file: ./databricks_lakehouse_pipelines/03_gold/02_alerts_stream_gld.py
        - task_key: Gold_OBT
          depends_on:
            - task_key: Silver_Stream
          environment_key: serverless_env
          spark_python_task:
            python_file: ./databricks_lakehouse_pipelines/03_gold/01_flat_table_gld.py